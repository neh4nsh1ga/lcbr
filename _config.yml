# Example Site settings

description: "무기한 자캐동맹"
image: "/assets/images/preview.png" 

url: "https://lcbr.f5boy.site"
baseurl: ""

header_pages:
  - index.md
  - pages/pages.md
  - pages/post.md
  - pages/blog.md
  - pages/idk.md
  - pages/about.md
  - pages/form.md
  - pages/note.md

lang: ko
timezone: Asia/Seoul

footer: 'LCBR은 <a href="https://x.com/ProjMoonStudio/status/1629085293428215808">ProjectMoon의 2차 창작 가이드</a>를 준수합니다.'

plugins:
  - jekyll-seo-tag
  - jekyll-linkpreview

collections:
  diary:
    output: true
  note:
    output: true

csp:
  directives:
    style-src:
      - "'self'"
      - "https://fonts.googleapis.com"
      - "https://cdn.jsdelivr.net"
      - "'unsafe-inline'"
      - "https://tally.so"

    font-src:
      - "'self'"
      - "https://fonts.gstatic.com"     
      - "https://cdn.jsdelivr.net"     
      - "https://fonts.cdnfonts.com"
      
    manifest-src:
      - "'self'"
      
    script-src:
      - "'self'"
      - "https://tally.so"
      - "'unsafe-inline'"

    frame-src:
      - "'self'"
      - "https://tally.so"
    
# listen_for_clients_preferred_style: true # true or false (default)

# Fonts
# disable_google_fonts: false # set true to prevent loading fonts.googleapis.com

